services:
  postgres:
    image: postgres:17
    container_name: heyloaf-postgres
    environment:
      POSTGRES_DB: heyloaf
      POSTGRES_USER: heyloaf
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heyloaf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
